:root {
  --orange: #F97316;
  --orange-dim: #c45c0e;
  --bg: #0A0A0A;
  --card: #141414;
  --border: #222;
  --text: #fff;
  --muted: #666;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
  overflow: hidden;
}

/* Background glow */
body::before {
  content: '';
  position: fixed;
  top: -200px;
  left: 50%;
  transform: translateX(-50%);
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(249,115,22,0.12) 0%, transparent 70%);
  pointer-events: none;
}

.wordmark {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 42px;
  letter-spacing: 2px;
  margin-bottom: 48px;
}
.wordmark span { color: var(--orange); }

.card {
  width: 100%;
  max-width: 380px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 32px 28px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  animation: rise 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
}

@keyframes rise {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}

.spinner-wrap {
  width: 56px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.spinner {
  width: 40px;
  height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--orange);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.status-text {
  font-size: 17px;
  font-weight: 600;
  text-align: center;
}

.sub-text {
  font-size: 13px;
  color: var(--muted);
  text-align: center;
  line-height: 1.5;
}

.btn-group {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 4px;
}

.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  padding: 14px 20px;
  border-radius: 12px;
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  text-decoration: none;
  border: none;
  transition: opacity 0.15s, transform 0.15s;
}

.btn:active { opacity: 0.8; transform: scale(0.98); }

.btn-primary {
  background: var(--orange);
  color: #fff;
}

.btn-secondary {
  background: var(--border);
  color: var(--text);
}

.divider {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 10px;
  color: var(--muted);
  font-size: 12px;
}

.divider::before, .divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* Hidden by default, shown after timeout */
.fallback { display: none; width: 100%; }

  </div>

  <script>
    // Extract the slug from the path: /events/some-slug-here
    const slug = window.location.pathname.replace(/^\/events\//, '').replace(/\/$/, '');
    const deepLink = `bord://events/${slug}`;

    // Set the open-in-app button
    document.getElementById('btn-open-app').href = deepLink;

    // Auto-trigger the deep link on load
    function tryOpenApp() {
      const iframe = document.createElement('iframe');
      iframe.style.display = 'none';
      iframe.src = deepLink;
      document.body.appendChild(iframe);
      setTimeout(() => document.body.removeChild(iframe), 2000);
    }

    // On iOS, use direct location change (more reliable)
    const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
    const isAndroid = /android/i.test(navigator.userAgent);

    if (isIOS) {
      window.location.href = deepLink;
    } else if (isAndroid) {
      tryOpenApp();
    } else {
      tryOpenApp();
    }
  </script>
