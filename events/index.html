<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bord — Opening event…</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --orange: #F97316; --bg: #0A0A0A; --card: #141414; --border: #222; --text: #fff; --muted: #666; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100dvh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
    body::before { content: ''; position: fixed; top: -200px; left: 50%; transform: translateX(-50%); width: 600px; height: 600px; background: radial-gradient(circle, rgba(249,115,22,0.12) 0%, transparent 70%); pointer-events: none; }
    .wordmark { font-family: 'Bebas Neue', sans-serif; font-size: 42px; letter-spacing: 2px; margin-bottom: 48px; }
    .wordmark span { color: var(--orange); }
    .card { width: 100%; max-width: 380px; background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 32px 28px; display: flex; flex-direction: column; align-items: center; gap: 20px; animation: rise 0.5s cubic-bezier(0.16, 1, 0.3, 1) both; }
    @keyframes rise { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
    .spinner-wrap { width: 56px; height: 56px; display: flex; align-items: center; justify-content: center; }
    .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--orange); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status-text { font-size: 17px; font-weight: 600; text-align: center; }
    .sub-text { font-size: 13px; color: var(--muted); text-align: center; line-height: 1.5; }
    .btn-group { width: 100%; display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
    .btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 14px 20px; border-radius: 12px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; text-decoration: none; border: none; transition: opacity 0.15s, transform 0.15s; }
    .btn:active { opacity: 0.8; transform: scale(0.98); }
    .btn-primary { background: var(--orange); color: #fff; }
    .divider { width: 100%; display: flex; align-items: center; gap: 10px; color: var(--muted); font-size: 12px; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .coming-soon { width: 100%; background: rgba(249,115,22,0.06); border: 1px solid rgba(249,115,22,0.2); border-radius: 12px; padding: 13px 16px; text-align: center; font-size: 13px; font-weight: 600; color: var(--orange); }
  </style>
</head>
<body>
  <div class="wordmark"><span>B</span>ord</div>
  <div class="card">
    <div style="width:100%;display:flex;flex-direction:column;align-items:center;gap:20px;">
      <div class="spinner-wrap"><div class="spinner"></div></div>
      <div class="status-text">Opening in Bord…</div>
      <div class="sub-text">If the app doesn't open automatically,<br>tap the button below.</div>
      <div class="btn-group">
        <a id="btn-open-app" href="#" class="btn btn-primary">🎉 Open in Bord</a>
        <div class="divider">don't have bord yet?</div>
        <div class="coming-soon">🚀 Coming soon to the App Store &amp; Google Play</div>
      </div>
    </div>
  </div>
  <script>
    const slug = window.location.pathname.replace(/^\/events\//, '').replace(/\/$/, '');
    const deepLink = 'bord://event/' + slug;
    document.getElementById('btn-open-app').href = deepLink;

    function tryOpenApp() {
      const iframe = document.createElement('iframe');
      iframe.style.display = 'none';
      iframe.src = deepLink;
      document.body.appendChild(iframe);
      setTimeout(() => document.body.removeChild(iframe), 2000);
    }

    const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
    const isAndroid = /android/i.test(navigator.userAgent);

    function showNotInstalled() {
      document.querySelector('.spinner').style.display = 'none';
      document.querySelector('.status-text').textContent = 'Get Bord to view this event';
      document.querySelector('.sub-text').textContent = 'Bord is currently in closed testing. Ask the host for a TestFlight invite.';
    }

    if (isIOS) {
      const t = setTimeout(showNotInstalled, 1500);
      document.addEventListener('visibilitychange', () => { if (document.hidden) clearTimeout(t); });
      window.location.href = deepLink;
    } else if (isAndroid) {
      const t = setTimeout(showNotInstalled, 1500);
      document.addEventListener('visibilitychange', () => { if (document.hidden) clearTimeout(t); });
      tryOpenApp();
    } else {
      document.querySelector('.spinner').style.display = 'none';
      document.querySelector('.status-text').textContent = 'This event is on Bord';
      document.querySelector('.sub-text').textContent = 'Open this link on your phone to view the event in the app.';
    }
  </script>
</body>
</html>
